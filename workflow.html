<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow de Governança</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="topo">
    <div class="topo-conteudo">
      <img src="./assets/logo-bracell.png" alt="Logo Bracell" class="logo" />
      <div class="titulos">
        <h1>Workflow de Governança</h1>
        <p>Validação tributária e fluxo de aprovação da solicitação</p>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="progress">
      <div class="progress-step completed">
        <span class="progress-number">1</span>
        <span class="progress-label">Política + Capa</span>
      </div>
      <div class="progress-line active"></div>
      <div class="progress-step completed">
        <span class="progress-number">2</span>
        <span class="progress-label">Detalhamento</span>
      </div>
      <div class="progress-line active"></div>
      <div class="progress-step active">
        <span class="progress-number">3</span>
        <span class="progress-label">Workflow</span>
      </div>
